name: Deploy to PythonAnywhere

on:
  push:
    branches:
      - main

env:
  PA_API_BASE: https://www.pythonanywhere.com/api/v0/user

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Notify site that an update is incoming
      continue-on-error: true
      run: |
        # this will 404 on the very first deploy (endpoint doesn't exist yet) — that's fine
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
          "https://${{ secrets.PA_USERNAME }}.pythonanywhere.com/api/deploy/notify" \
          -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
          -H "Content-Type: application/json" \
          -d '{"message": "A new update is being deployed. The site will refresh shortly."}')
        echo "Notify response: HTTP $HTTP_CODE"
        if [ "$HTTP_CODE" = "200" ]; then
          echo "Site notified successfully."
        else
          echo "Could not notify site (HTTP $HTTP_CODE). This is expected on first deploy."
        fi

    - name: Wait for any running scan to finish
      run: |
        echo "Checking if a scan is running..."
        MAX_WAIT=18000
        WAITED=0
        while [ $WAITED -lt $MAX_WAIT ]; do
          RESP=$(curl -s "https://${{ secrets.PA_USERNAME }}.pythonanywhere.com/api/deploy/status" 2>/dev/null || echo '{"scanning":false}')
          SCANNING=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('scanning', False))" 2>/dev/null || echo "False")
          if [ "$SCANNING" != "True" ]; then
            echo "No scan running. Proceeding with deploy."
            break
          fi
          echo "Scan in progress, waiting... (${WAITED}s)"
          sleep 15
          WAITED=$((WAITED + 15))
        done
        if [ $WAITED -ge $MAX_WAIT ]; then
          echo "Scan still running after 5 hours. Deploying anyway."
        fi

    - name: Run git pull on existing console
      run: |
        # send cd + git pull to the existing console
        echo "Sending git pull command..."
        curl -s -X POST \
          "${{ env.PA_API_BASE }}/${{ secrets.PA_USERNAME }}/consoles/${{ secrets.PA_CONSOLE_NUMBER }}/send_input/" \
          -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"input": "cd /home/${{ secrets.PA_USERNAME }}/Rotection && git pull origin main\n"}'

        # give git pull time to complete — no reliable way to check output
        echo "Waiting for git pull to complete..."
        sleep 10
        echo "Done waiting."

    - name: Reload PythonAnywhere Web App
      run: |
        echo "Reloading web app..."
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
          "${{ env.PA_API_BASE }}/${{ secrets.PA_USERNAME }}/webapps/${{ secrets.PA_USERNAME }}.pythonanywhere.com/reload/" \
          -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}")
        echo "Reload response: HTTP $HTTP_CODE"
        if [ "$HTTP_CODE" = "200" ]; then
          echo "Web app reloaded successfully."
        else
          echo "Warning: Reload returned HTTP $HTTP_CODE (this may still be OK)."
        fi
