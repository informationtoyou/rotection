name: Deploy to PythonAnywhere

on:
  push:
    branches:
      - main

env:
  PA_API_BASE: https://www.pythonanywhere.com/api/v0/user

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Notify site that an update is incoming
      run: |
        curl -sf -X POST \
          "https://${{ secrets.PA_USERNAME }}.pythonanywhere.com/api/deploy/notify" \
          -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
          -H "Content-Type: application/json" \
          -d '{"message": "A new update is being deployed. The site will refresh shortly."}' \
          && echo "Site notified." \
          || echo "Warning: Could not notify site (may be down or first deploy)"

    - name: Wait for any running scan to finish
      run: |
        echo "Checking if a scan is running..."
        MAX_WAIT=600
        WAITED=0
        while [ $WAITED -lt $MAX_WAIT ]; do
          RESP=$(curl -sf "https://${{ secrets.PA_USERNAME }}.pythonanywhere.com/api/deploy/status" 2>/dev/null || echo '{"scanning":false}')
          SCANNING=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('scanning', False))" 2>/dev/null || echo "False")
          if [ "$SCANNING" = "False" ]; then
            echo "No scan running. Proceeding with deploy."
            break
          fi
          echo "Scan in progress, waiting... (${WAITED}s / ${MAX_WAIT}s)"
          sleep 10
          WAITED=$((WAITED + 10))
        done
        if [ $WAITED -ge $MAX_WAIT ]; then
          echo "Warning: Timed out waiting for scan. Deploying anyway."
        fi

    - name: Create a temporary console and run git pull
      id: gitpull
      run: |
        # create a new bash console
        echo "Creating temporary console..."
        CREATE_RESP=$(curl -sf -X POST \
          "${{ env.PA_API_BASE }}/${{ secrets.PA_USERNAME }}/consoles/" \
          -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"executable": "bash", "arguments": "", "working_directory": "/home/${{ secrets.PA_USERNAME }}/Rotection"}')

        CONSOLE_ID=$(echo "$CREATE_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
        echo "Console created: $CONSOLE_ID"
        echo "console_id=$CONSOLE_ID" >> "$GITHUB_OUTPUT"

        # give the console a moment to initialise
        sleep 3

        # send the git pull command with a unique marker so we can detect completion
        MARKER="__DEPLOY_DONE_$(date +%s)__"
        curl -sf -X POST \
          "${{ env.PA_API_BASE }}/${{ secrets.PA_USERNAME }}/consoles/${CONSOLE_ID}/send_input/" \
          -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d "{\"input\": \"git pull origin main && echo ${MARKER}\\n\"}"

        echo "Waiting for git pull to finish..."
        MAX_WAIT=60
        WAITED=0
        while [ $WAITED -lt $MAX_WAIT ]; do
          sleep 3
          WAITED=$((WAITED + 3))
          OUTPUT=$(curl -sf \
            "${{ env.PA_API_BASE }}/${{ secrets.PA_USERNAME }}/consoles/${CONSOLE_ID}/get_latest_output/" \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" || echo "")
          if echo "$OUTPUT" | grep -q "$MARKER"; then
            echo "git pull completed successfully."
            break
          fi
          echo "Still pulling... (${WAITED}s)"
        done
        if [ $WAITED -ge $MAX_WAIT ]; then
          echo "Warning: Timed out waiting for git pull output."
        fi

    - name: Clean up temporary console
      if: always()
      run: |
        CONSOLE_ID="${{ steps.gitpull.outputs.console_id }}"
        if [ -n "$CONSOLE_ID" ]; then
          curl -sf -X DELETE \
            "${{ env.PA_API_BASE }}/${{ secrets.PA_USERNAME }}/consoles/${CONSOLE_ID}/" \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            && echo "Console $CONSOLE_ID deleted." \
            || echo "Warning: Could not delete console $CONSOLE_ID"
        fi

    - name: Reload PythonAnywhere Web App
      run: |
        curl -sf -X POST \
          "${{ env.PA_API_BASE }}/${{ secrets.PA_USERNAME }}/webapps/${{ secrets.PA_USERNAME }}.pythonanywhere.com/reload/" \
          -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
          && echo "Web app reloaded." \
          || { echo "ERROR: Failed to reload web app!"; exit 1; }
